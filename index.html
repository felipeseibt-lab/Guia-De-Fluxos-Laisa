<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia de Fluxos · Laisa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --surface2: #f2f0ea;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
    --text: #1a1917; --text-muted: #6b6a66; --text-faint: #a09e99;
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-border: #9FE1CB;
    --amber: #EF9F27; --amber-light: #FAEEDA; --amber-dark: #633806;
    --blue: #185FA5; --blue-light: #E6F1FB; --blue-border: #85B7EB;
    --purple-light: #EEEDFE; --purple: #3C3489;
    --red-light: #FCEBEB; --red: #A32D2D;
    --radius: 8px; --radius-lg: 12px;
    --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
  .page-wrap { max-width: 900px; margin: 0 auto; }

  /* HEADER */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--teal); flex-shrink: 0; margin-top: 5px; }
  .page-title { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
  .header-meta { text-align: right; font-size: 12px; color: var(--text-faint); font-family: var(--mono); }

  /* SECTION */
  .section { margin-bottom: 2rem; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--teal); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .section-label::after { content: ''; flex: 1; height: .5px; background: var(--teal-border); }

  /* ROWS */
  .rows-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); }
  .item-wrap { border-bottom: .5px solid var(--border); }
  .item-wrap:last-child { border-bottom: none; }
  .item-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface); }
  .item-num { font-size: 12px; color: var(--text-faint); font-family: var(--mono); min-width: 20px; }
  .item-name { flex: 1; font-size: 14px; color: var(--text); }
  .item-tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-family: var(--mono); margin-right: 2px; white-space: nowrap; }
  .tag-tms { background: var(--blue-light); color: var(--blue); border: .5px solid var(--blue-border); }
  .tag-opmdm { background: var(--teal-light); color: #0F6E56; border: .5px solid var(--teal-border); }
  .item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  /* FLAG */
  .flag-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: .5px solid var(--border-strong); cursor: pointer; background: transparent; color: var(--text-muted); display: flex; align-items: center; gap: 5px; font-family: var(--sans); transition: all .15s; white-space: nowrap; }
  .flag-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
  .flag-btn:hover, .flag-btn.active { background: var(--amber-light); border-color: var(--amber); color: var(--amber-dark); }

  /* DOC PANEL */
  .doc-panel { display: none; border-left: 3px solid var(--amber); background: #fffdf7; }
  .doc-panel.open { display: block; animation: sd .2s ease; }
  @keyframes sd { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .doc-inner { padding: 22px 24px 24px; font-size: 13px; line-height: 1.75; color: var(--text); }
  .doc-block { margin-bottom: 22px; }
  .doc-block:last-child { margin-bottom: 0; }
  .doc-h { font-size: 11px; font-weight: 500; letter-spacing: .09em; text-transform: uppercase; color: var(--amber); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .doc-h svg { width: 13px; height: 13px; flex-shrink: 0; }
  .doc-p { margin-bottom: 8px; }
  .doc-p:last-child { margin-bottom: 0; }
  .doc-p strong { font-weight: 500; }
  .doc-divider { height: .5px; background: rgba(0,0,0,.08); margin: 20px 0; }
  code { font-family: var(--mono); font-size: 11.5px; background: var(--blue-light); color: var(--blue); padding: 1px 5px; border-radius: 4px; }
  .doc-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 6px; }
  .doc-table th { text-align: left; padding: 6px 10px; background: var(--surface2); color: var(--text-muted); font-weight: 500; border-bottom: .5px solid var(--border-strong); font-size: 11px; }
  .doc-table td { padding: 7px 10px; border-bottom: .5px solid var(--border); vertical-align: top; }
  .doc-table tr:last-child td { border-bottom: none; }
  .doc-table tr:hover td { background: #fafaf8; }
  .tag { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 4px; font-family: var(--mono); }
  .tag-tbl { background: var(--blue-light); color: var(--blue); }
  .tag-mongo { background: var(--teal-light); color: #0F6E56; }
  .tag-ai { background: var(--purple-light); color: var(--purple); }
  .step-list { list-style: none; padding: 0; margin: 4px 0 0; counter-reset: steps; }
  .step-list li { counter-increment: steps; display: flex; gap: 10px; margin-bottom: 7px; align-items: flex-start; }
  .step-list li::before { content: counter(steps); min-width: 20px; height: 20px; border-radius: 50%; background: var(--amber); color: var(--amber-dark); font-size: 11px; font-weight: 500; font-family: var(--mono); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }

  /* DEPS */
  .deps-box { background: var(--surface2); border: .5px solid var(--border-strong); border-radius: var(--radius); padding: 12px 14px; margin-top: 6px; }
  .dep-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
  .dep-item:last-child { margin-bottom: 0; }
  .dep-code { font-family: var(--mono); font-size: 11px; background: var(--amber-light); color: var(--amber-dark); border: .5px solid var(--amber); padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
  .dep-desc { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .dep-desc strong { font-weight: 500; }

  /* FOOTER */
  .footer { margin-top: 3rem; padding-top: 1.5rem; border-top: .5px solid var(--border); font-size: 12px; color: var(--text-faint); display: flex; align-items: center; justify-content: space-between; }

  @media (max-width: 600px) {
    .page-header { flex-direction: column; gap: 8px; }
    .header-meta { text-align: left; }
    .doc-table { font-size: 12px; }
    .item-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <header class="page-header">
    <div class="logo-area">
      <div class="logo-dot"></div>
      <div><div class="page-title">Guia de Fluxos · Laisa</div></div>
    </div>
    <div class="header-meta">Atualizado em <span id="gen-date"></span><br>Lincros Automação</div>
  </header>
  <div id="sections-root"></div>
  <footer class="footer">
    <span>Clique em "Documentação" para ver os detalhes de cada fluxo</span>
    <span>v2.0</span>
  </footer>
</div>
<script>
document.getElementById('gen-date').textContent = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});

const DOC_FIM_ROTA = `<div class="doc-inner">
  <div class="doc-block">
    <div class="doc-h"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Objetivo do fluxo</div>
    <p class="doc-p">O fluxo <strong>Fim de Rota</strong> monitora automaticamente se o motorista finalizou a viagem no aplicativo após concluir as entregas. Quando detecta que as entregas foram realizadas mas a rota ainda está em aberto no sistema, ele aciona a IA <strong>Laisa</strong> para notificar o motorista via WhatsApp — evitando que rotas fiquem com status incorreto no TMS e prejudiquem os indicadores do cliente.</p>

  <div class="doc-block">

    <table class="doc-table">

    <p class="doc-p">Executada a cada 15 min. Busca rotas que atendam <strong>todos</strong> os critérios:</p>

      <tr><td><code>NOT EXISTS TB_TRATAMENTO_EVENTO</code></td><td>Evita reenvio — rota ainda não foi notificada</td></tr>

    </table>
  </div>
  <div class="doc-divider"></div>
  <div class="doc-block">
    <div class="doc-h"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>IA Laisa — Mensagem e ações possíveis</div>
    <p class="doc-p">A IA gera mensagem personalizada via <strong>OpenRouter</strong>, envia pelo <strong>GUPSHUP</strong> (WhatsApp Business) e categoriza a resposta do motorista em uma das ações:</p>

const DOC_TEMPERATURA = `<div class="doc-inner">

    <p class="doc-p">A Laisa envia mensagem personalizada via <strong>UAZAPI</strong> (WhatsApp) informando que identificou temperatura irregular e pedindo que o motorista verifique o baú. O motorista pode responder de 3 formas:</p>

    <p class="doc-p">O sistema distingue <strong>1º acesso</strong> (insert) de <strong>renovação de acesso</strong> (update) com fluxos separados:</p>
    <table class="doc-table">
      <tr><th>Situação</th><th>O que acontece</th></tr>
      <tr><td>1º acesso — sem cadastro no <code>transpTabAux</code></td><td>Agente solicita nome, CNPJ e confirmação da transportadora — valida no PostgreSQL (<code>filial_transportadora</code>) e faz insert no MongoDB</td></tr>
      <tr><td>Retorno — cadastro já existe</td><td>Agente reconhece o usuário e atualiza os dados se necessário (<code>mensagem-update</code>)</td></tr>
      <tr><td>Flag <code>bloqueado = true</code></td><td>Acesso negado — transportadora está bloqueada no sistema</td></tr>
    </table>
  </div>
  <div class="doc-divider"></div>
  <div class="doc-block">
    <div class="doc-h"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Processamento do canhoto</div>
    <p class="doc-p">Aceita <strong>texto, áudio e imagem</strong>:</p>
    <table class="doc-table">
      <tr><th>Tipo</th><th>Como é processado</th></tr>
      <tr><td>Imagem</td><td>Baixada via UAZAPI, IA extrai os dados do canhoto (NF, série, assinatura, data) e valida contra o TMS</td></tr>
      <tr><td>Áudio</td><td>Baixado via UAZAPI e transcrito com <strong>Groq Whisper large-v3</strong> antes de processar</td></tr>
      <tr><td>Arquivo não suportado</td><td>Laisa responde que só aceita imagens, texto e áudio</td></tr>
    </table>
    <p class="doc-p" style="margin-top:8px">Validação da NF: busca no TMS via <code>ws-tms.lincros.com/api/v2/nota/buscarNotaFiscal</code> pela chave NFe, ou diretamente no PostgreSQL por <code>nr_nota_fiscal + nm_serie + oid_empresa</code>.</p>
    <p class="doc-p">Ações do agente: <code>mensagem</code> (responde) · <code>mensagem-insert</code> (cadastra novo usuário) · <code>mensagem-update</code> (atualiza cadastro existente).</p>
  </div>
  <div class="doc-divider"></div>
  <div class="doc-block">
    <div class="doc-h"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Valor para o time comercial</div>
    <p class="doc-p"><strong>Problema que resolve:</strong> Transportadoras precisam enviar canhotos por e-mail, o que gera atraso, perda de arquivos e retrabalho para a equipe que precisa identificar qual NF cada canhoto corresponde.</p>
    <p class="doc-p"><strong>Como vender:</strong> A transportadora envia a foto do canhoto direto pelo WhatsApp — a IA lê, valida contra o TMS e registra automaticamente. Sem e-mail, sem planilha, sem identificação manual. O representante da transportadora é cadastrado automaticamente no primeiro acesso e reconhecido nos envios seguintes. Todo o histórico de conversas é rastreado e auditável.</p>
  </div>
</div>`;

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function render() {
  const root = document.getElementById('sections-root');
  root.innerHTML = '';
  data.forEach(sec => {
    const secEl = document.createElement('div');
    secEl.className = 'section';
    const sl = document.createElement('div');
    sl.className = 'section-label';
    sl.textContent = sec.label;
    secEl.appendChild(sl);
    const rowsWrap = document.createElement('div');
    rowsWrap.className = 'rows-wrap';
    sec.items.forEach((item, idx) => {
      const itemWrap = document.createElement('div');
      itemWrap.className = 'item-wrap';
      const row = document.createElement('div');
      row.className = 'item-row';
      const num = document.createElement('span');
      num.className = 'item-num';
      num.textContent = idx + 1;
      const name = document.createElement('span');
      name.className = 'item-name';
      name.textContent = item.name;
      const actions = document.createElement('div');
      actions.className = 'item-actions';
      if (item.tag) {
        const tagEl = document.createElement('span');
        tagEl.className = 'item-tag ' + item.tagClass;
        tagEl.textContent = item.tag;
        actions.appendChild(tagEl);
      }
      const flagBtn = document.createElement('button');
      flagBtn.className = 'flag-btn' + (item.docOpen ? ' active' : '');
      flagBtn.innerHTML = flagIcon + ' Documentação';
      flagBtn.addEventListener('click', () => { item.docOpen = !item.docOpen; render(); });
      actions.appendChild(flagBtn);
      row.appendChild(num);
      row.appendChild(name);
      row.appendChild(actions);
      itemWrap.appendChild(row);
      const panel = document.createElement('div');
      panel.className = 'doc-panel' + (item.docOpen ? ' open' : '');
      panel.innerHTML = item.doc;
      itemWrap.appendChild(panel);
      rowsWrap.appendChild(itemWrap);
    });
    secEl.appendChild(rowsWrap);
    root.appendChild(secEl);
  });
}
render();
